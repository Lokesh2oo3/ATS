<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Applicant Tracking System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gray-50">
    <div class="min-h-screen">
        <!-- Navigation -->
        <nav class="bg-blue-600 text-white shadow-lg">
            <div class="max-w-7xl mx-auto px-4 py-4 flex justify-between items-center">
                <div class="flex items-center space-x-2">
                    <i class="fas fa-briefcase text-2xl"></i>
                    <h1 class="text-2xl font-bold">ATS</h1>
                </div>
                <ul class="flex space-x-6">
                    <li><a href="#dashboard" class="hover:text-blue-200">Dashboard</a></li>
                    <li><a href="#jobs" class="hover:text-blue-200">Jobs</a></li>
                    <li><a href="#candidates" class="hover:text-blue-200">Candidates</a></li>
                    <li><a href="#applications" class="hover:text-blue-200">Pipeline</a></li>
                </ul>
            </div>
        </nav>

        <!-- Main Content -->
        <div class="max-w-7xl mx-auto px-4 py-8">
            <!-- Dashboard Section -->
            <section id="dashboard" class="mb-12">
                <h2 class="text-3xl font-bold mb-6">Dashboard</h2>
                <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
                    <div class="bg-white p-6 rounded-lg shadow">
                        <div class="text-gray-600 text-sm font-semibold">Total Jobs</div>
                        <div id="totalJobs" class="text-3xl font-bold text-blue-600 mt-2">0</div>
                    </div>
                    <div class="bg-white p-6 rounded-lg shadow">
                        <div class="text-gray-600 text-sm font-semibold">Total Candidates</div>
                        <div id="totalCandidates" class="text-3xl font-bold text-green-600 mt-2">0</div>
                    </div>
                    <div class="bg-white p-6 rounded-lg shadow">
                        <div class="text-gray-600 text-sm font-semibold">Applications</div>
                        <div id="totalApplications" class="text-3xl font-bold text-purple-600 mt-2">0</div>
                    </div>
                    <div class="bg-white p-6 rounded-lg shadow">
                        <div class="text-gray-600 text-sm font-semibold">Hired</div>
                        <div id="totalHired" class="text-3xl font-bold text-yellow-600 mt-2">0</div>
                    </div>
                </div>
            </section>

            <!-- Jobs Section -->
            <section id="jobs" class="mb-12">
                <div class="flex justify-between items-center mb-6">
                    <h2 class="text-3xl font-bold">Job Openings</h2>
                    <button onclick="showJobForm()" class="bg-blue-600 text-white px-4 py-2 rounded-lg hover:bg-blue-700">
                        <i class="fas fa-plus mr-2"></i>Add Job
                    </button>
                </div>
                <div id="jobsList" class="space-y-4"></div>
            </section>

            <!-- Candidates Section -->
            <section id="candidates" class="mb-12">
                <div class="flex justify-between items-center mb-6">
                    <h2 class="text-3xl font-bold">Candidates</h2>
                    <button onclick="showCandidateForm()" class="bg-green-600 text-white px-4 py-2 rounded-lg hover:bg-green-700">
                        <i class="fas fa-plus mr-2"></i>Add Candidate
                    </button>
                </div>
                <div id="candidatesList" class="space-y-4"></div>
            </section>

            <!-- Applications Section -->
            <section id="applications" class="mb-12">
                <h2 class="text-3xl font-bold mb-6">Application Pipeline</h2>
                <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
                    <div class="bg-white p-4 rounded-lg shadow">
                        <h3 class="font-bold text-gray-700 mb-4">Applied</h3>
                        <div id="appliedList" class="space-y-2"></div>
                    </div>
                    <div class="bg-white p-4 rounded-lg shadow">
                        <h3 class="font-bold text-gray-700 mb-4">Screening</h3>
                        <div id="screeningList" class="space-y-2"></div>
                    </div>
                    <div class="bg-white p-4 rounded-lg shadow">
                        <h3 class="font-bold text-gray-700 mb-4">Interview</h3>
                        <div id="interviewList" class="space-y-2"></div>
                    </div>
                    <div class="bg-white p-4 rounded-lg shadow">
                        <h3 class="font-bold text-gray-700 mb-4">Offer</h3>
                        <div id="offerList" class="space-y-2"></div>
                    </div>
                </div>
            </section>
        </div>
    </div>

    <!-- Job Form Modal -->
    <div id="jobModal" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50">
        <div class="bg-white p-8 rounded-lg shadow-lg max-w-md w-full">
            <h3 class="text-2xl font-bold mb-4">Add New Job</h3>
            <form id="jobForm" onsubmit="submitJobForm(event)">
                <div class="mb-4">
                    <label class="block text-gray-700 font-semibold mb-2">Job Title</label>
                    <input type="text" id="jobTitle" class="w-full border rounded px-3 py-2" required>
                </div>
                <div class="mb-4">
                    <label class="block text-gray-700 font-semibold mb-2">Description</label>
                    <textarea id="jobDescription" class="w-full border rounded px-3 py-2" rows="4"></textarea>
                </div>
                <div class="mb-4">
                    <label class="block text-gray-700 font-semibold mb-2">Department</label>
                    <input type="text" id="jobDepartment" class="w-full border rounded px-3 py-2" required>
                </div>
                <div class="mb-4">
                    <label class="block text-gray-700 font-semibold mb-2">Location</label>
                    <input type="text" id="jobLocation" class="w-full border rounded px-3 py-2" required>
                </div>
                <div class="flex space-x-2">
                    <button type="submit" class="flex-1 bg-blue-600 text-white px-4 py-2 rounded hover:bg-blue-700">Save</button>
                    <button type="button" onclick="closeJobForm()" class="flex-1 bg-gray-400 text-white px-4 py-2 rounded hover:bg-gray-500">Cancel</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Candidate Form Modal -->
    <div id="candidateModal" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50">
        <div class="bg-white p-8 rounded-lg shadow-lg max-w-md w-full">
            <h3 class="text-2xl font-bold mb-4">Add New Candidate</h3>
            <form id="candidateForm" onsubmit="submitCandidateForm(event)">
                <div class="mb-4">
                    <label class="block text-gray-700 font-semibold mb-2">First Name</label>
                    <input type="text" id="candidateFirstName" class="w-full border rounded px-3 py-2" required>
                </div>
                <div class="mb-4">
                    <label class="block text-gray-700 font-semibold mb-2">Last Name</label>
                    <input type="text" id="candidateLastName" class="w-full border rounded px-3 py-2" required>
                </div>
                <div class="mb-4">
                    <label class="block text-gray-700 font-semibold mb-2">Email</label>
                    <input type="email" id="candidateEmail" class="w-full border rounded px-3 py-2" required>
                </div>
                <div class="mb-4">
                    <label class="block text-gray-700 font-semibold mb-2">Phone</label>
                    <input type="tel" id="candidatePhone" class="w-full border rounded px-3 py-2">
                </div>
                <div class="flex space-x-2">
                    <button type="submit" class="flex-1 bg-green-600 text-white px-4 py-2 rounded hover:bg-green-700">Save</button>
                    <button type="button" onclick="closeCandidateForm()" class="flex-1 bg-gray-400 text-white px-4 py-2 rounded hover:bg-gray-500">Cancel</button>
                </div>
            </form>
        </div>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
